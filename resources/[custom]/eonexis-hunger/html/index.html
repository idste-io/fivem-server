<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hunger</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="bars" class="hidden">
  <div class="bar-row">
    <span class="icon">🍔</span>
    <div class="bar-track"><div id="hunger-fill" class="bar-fill hunger"></div></div>
    <span id="hunger-val" class="val">100%</span>
  </div>
  <div class="bar-row">
    <span class="icon">💧</span>
    <div class="bar-track"><div id="thirst-fill" class="bar-fill thirst"></div></div>
    <span id="thirst-val" class="val">100%</span>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
