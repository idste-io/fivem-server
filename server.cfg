# FiveM Server Configuration
# Get your license key at https://keymaster.fivem.net
sv_licenseKey "YOUR_LICENSE_KEY_HERE"

# Server identity
sv_hostname "My FiveM Server"
sv_projectName "FiveM Server"
sv_projectDesc "Running on invoxio VPS"

# Network
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# Slots
sv_maxclients 32

# Game type
set sv_enforceGameBuild 2944

# Resources
ensure spawnmanager
ensure sessionmanager
ensure chat
ensure basic-gamemode

# txAdmin (web panel at :40120 — do not remove)
add_ace resource.txAdmin command allow
add_ace resource.txAdmin_client command allow
add_principal identifier.fivem:1 group.admin
