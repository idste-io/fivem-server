# Eonexis FiveM Server — server.cfg
# License key stored in license.cfg (gitignored, VPS only)
exec license.cfg

# ── Server identity ────────────────────────────────────────────────────────────
sv_hostname "^1Eonexis ^7— Custom RP"
sets sv_projectName "Eonexis"
sets sv_projectDesc "The Eonexis RP Experience — GTA V FiveM server with custom mods, branded HUD, and community-first design. Join us at discord.gg/jsa8UgGcCD"
sets tags "roleplay,custom,hud,eonexis"
sets locale "en-US"

# Network
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

sv_maxclients 64
set sv_enforceGameBuild 2944

