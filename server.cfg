# ── Phase 11 — Custom Eonexis Mods ────────────────────────────────────────────
# Load order: notify → economy (data store) → everything else
ensure loading-screen
ensure eonexis-notify
ensure eonexis-economy       # central data store — must load before properties/vehicles/jobs
ensure eonexis-hud
ensure eonexis-rules
ensure eonexis-welcomegift
ensure eonexis-discord
ensure eonexis-weather
ensure eonexis-emotes
ensure eonexis-admintools
ensure eonexis-nameplate
ensure eonexis-fuel
ensure eonexis-speedometer
ensure eonexis-spawn
ensure eonexis-anticheat
ensure eonexis-properties    # depends on economy
ensure eonexis-vehicles      # depends on economy
ensure eonexis-jobs          # depends on economy
ensure eonexis-inventory     # depends on economy
ensure eonexis-controller    # controller shortcut keys
ensure eonexis-gps           # minimap blips for all POIs
ensure eonexis-phone         # in-game smartphone (P key)
ensure eonexis-daily         # daily check-in bonus
ensure eonexis-casino        # lucky wheel casino
ensure eonexis-smallresources # seatbelt, AFK kick, cruise control, auto-helmet
ensure eonexis-shops         # convenience stores — buy food & supplies
ensure eonexis-hunger        # hunger + thirst bars (depends on inventory)
# ensure eonexis-multichar   # enable when multi-character flow is ready

# ── Core system resources (always on) ─────────────────────────────────────────
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure baseevents
ensure hardcap

# ── txAdmin (web panel at :40120) ─────────────────────────────────────────────
add_ace resource.txAdmin command allow
add_ace resource.txAdmin_client command allow
add_principal identifier.fivem:1 group.admin
