<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eonexis Skill Tree</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="tree" class="hidden">
  <div class="panel">
    <div class="panel-header">
      <div>
        <h1>⚡ Skill Tree</h1>
        <p class="subtitle">Complete goals to unlock rewards and learn the server.</p>
      </div>
      <button class="btn-close" onclick="post('close')">✕</button>
    </div>

    <!-- Tier tabs -->
    <div class="tier-tabs">
      <button class="tier-tab active" onclick="filterTier(0)">All</button>
      <button class="tier-tab" onclick="filterTier(1)">Tier 1 — Onboarding</button>
      <button class="tier-tab" onclick="filterTier(2)">Tier 2 — Established</button>
      <button class="tier-tab" onclick="filterTier(3)">Tier 3 — Advanced</button>
    </div>

    <div class="progress-bar-wrap">
      <div id="progress-fill" class="progress-fill"></div>
      <span id="progress-text" class="progress-text">0 / 0</span>
    </div>

    <div id="skill-list" class="skill-list"></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
