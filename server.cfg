# FiveM Server Configuration — Eonexis
# License key is stored in license.cfg (gitignored, lives only on VPS)
exec license.cfg

# Server identity
sv_hostname "Eonexis"
sv_projectName "Eonexis"
sv_projectDesc "Eonexis FiveM Server"

# Network
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# Slots
sv_maxclients 32

# Game build
set sv_enforceGameBuild 2944

# ── Core resources ────────────────────────────────────────────────────────────
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure baseevents
ensure hardcap

# ── Custom mods (resources/[custom]/) ─────────────────────────────────────────
# Add your mod names below after shipping them:
# ensure my-mod-name

# ── txAdmin (web panel at :40120) ─────────────────────────────────────────────
add_ace resource.txAdmin command allow
add_ace resource.txAdmin_client command allow
add_principal identifier.fivem:1 group.admin
